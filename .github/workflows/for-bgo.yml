name: Build/CLI

on:
  workflow_dispatch:
    inputs:
      is_release:
        description: "是否发布 Release（true 则上传到 Release，false 则上传构建产物为 artifact）"
        required: false
        type: boolean
        default: false
      force_replace:
        description: "当 tag 已存在时，是否强行替换（移动 tag 到当前提交并清空旧资产）"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "发布时使用的 tag 名（is_release=true 时必填，例如 v3.1.2）"
        required: false
        type: string
        default: ""
      release_name:
        description: "Release 名称（可选，不填则默认等于 tag）"
        required: false
        type: string
        default: ""

jobs:
  release:
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 60
    env: {}

    strategy:
      matrix:
        include:
          - os: ubuntu
            arch: x64
            runs-on: ubuntu-22.04
          - os: ubuntu
            arch: arm64
            runs-on: ubuntu-22.04-arm
          - os: macos
            arch: x64
            runs-on: macos-13
          - os: macos
            arch: arm64
            runs-on: macos-14
          - os: windows
            arch: x64
            runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4.1.0
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
          cache-dependency-path: ./pnpm-lock.yaml

      - name: Validate release inputs early (fail-fast)
        if: ${{ inputs.is_release }}
        id: validate_release
        run: node ./scripts/github-ci-artifacts.js validate-release --tag "${{ inputs.release_tag }}" --name "${{ inputs.release_name }}"

      - name: Check existing release/tag (fail or prepare)
        if: ${{ inputs.is_release }}
        id: check_existing
        run: node ./scripts/github-ci-artifacts.js check-release --tag "${{ steps.validate_release.outputs.release_tag || inputs.release_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Guard duplicate tag without force_replace
        if: ${{ inputs.is_release && !inputs.force_replace && steps.check_existing.outputs.release_exists == 'true' }}
        run: node -e "throw new Error('Release with this tag already exists. Set force_replace=true to replace it.')"

      - name: Force move tag to current commit
        if: ${{ inputs.is_release && inputs.force_replace }}
        run: node ./scripts/github-ci-artifacts.js move-tag --tag "${{ steps.validate_release.outputs.release_tag || inputs.release_tag }}" --sha "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print node arch (debug)
        run: node -p "process.platform + ' ' + process.arch"

      - name: pnpm-update-for-win
        if: startsWith(matrix.os, 'windows')
        run: node ./scripts/github-ci-pnpm-update.js
      
      # 发布模式下优先复用同一提交的构建产物
      - name: Download prebuilt artifact for this commit
        if: ${{ inputs.is_release }}
        id: download_artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: for-bgo.yml
          name: bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}
          commit: ${{ github.sha }}
          path: packages/CLI/lib
          if_no_artifact_found: warn

      - name: Check prebuilt presence
        if: ${{ inputs.is_release }}
        id: prebuilt
        run: node ./scripts/github-ci-artifacts.js check-prebuilt --path packages/CLI/lib

      - name: Prefetch deps
        if: ${{ !inputs.is_release || (inputs.is_release && steps.prebuilt.outputs.found != 'true') }}
        run: pnpm fetch

      - name: Install CLI dependencies
        if: ${{ !inputs.is_release || (inputs.is_release && steps.prebuilt.outputs.found != 'true') }}
        run: pnpm -F bililive-cli... install --frozen-lockfile --prefer-offline

      - name: build CLI
        if: ${{ !inputs.is_release || (inputs.is_release && steps.prebuilt.outputs.found != 'true') }}
        run: pnpm -F bililive-cli... build

      - name: Move CLI package
        if: ${{ !inputs.is_release || (inputs.is_release && steps.prebuilt.outputs.found != 'true') }}
        run: pnpm -F bililive-cli movePackage

      - name: release
        if: ${{ inputs.is_release }}
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifactErrorsFailBuild: false
          artifacts: "packages/CLI/lib/**"
          replacesArtifacts: ${{ inputs.force_replace && matrix.os == 'ubuntu' && matrix.arch == 'x64' }}
          tag: ${{ steps.validate_release.outputs.release_tag || inputs.release_tag }}
          name: ${{ steps.validate_release.outputs.release_name || inputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: ${{ !inputs.is_release }}
        uses: actions/upload-artifact@v4
        with:
          name: bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            packages/CLI/lib/*
            packages/CLI/lib/**
          retention-days: 30

permissions:
  contents: write
