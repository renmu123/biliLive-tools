name: Build/CLI

on:
  workflow_dispatch:
    inputs:
      is_release:
        description: "是否发布 Release（true 则上传到 Release，false 则上传构建产物为 artifact）"
        required: false
        type: boolean
        default: false
      force_replace:
        description: "当 tag 已存在时，是否强行替换（移动 tag 到当前提交并清空旧资产）"
        required: false
        type: boolean
        default: false
      release_tag:
        description: "发布时使用的 tag 名（is_release=true 时必填，例如 v3.1.2）"
        required: false
        type: string
        default: ""
      release_name:
        description: "Release 名称（可选，不填则默认等于 tag）"
        required: false
        type: string
        default: ""

jobs:
  build-only:
    if: ${{ !inputs.is_release }}
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 10
    env: {}

    strategy:
      matrix:
        include: &cli_matrix
          - os: ubuntu
            arch: x64
            runs-on: ubuntu-22.04
          - os: ubuntu
            arch: armv7
            runs-on: ubuntu-22.04
          - os: ubuntu
            arch: arm64
            runs-on: ubuntu-22.04-arm
          - os: macos
            arch: x64
            runs-on: macos-13
          - os: macos
            arch: arm64
            runs-on: macos-14
          - os: windows
            arch: x64
            runs-on: windows-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node + pnpm (composite)
        uses: ./.github/actions/cli-setup

      - name: Build CLI (composite)
        if: ${{ matrix.arch != 'armv7' }}
        uses: ./.github/actions/cli-build

      - name: Build CLI in Ubuntu armv7 (emulated)
        if: ${{ matrix.arch == 'armv7' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: ubuntu22.04
          image: arm32v7/ubuntu:22.04
          githubToken: ${{ github.token }}
          shell: /bin/bash
          install: |
            set -euxo pipefail
            apt-get update -y
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              ca-certificates curl git tar xz-utils build-essential python3 pkg-config \
              libfontconfig1-dev libfreetype6-dev libcairo2-dev libpango1.0-dev libharfbuzz-dev \
              libjpeg-dev libpng-dev librsvg2-dev
            # Install Node v20.10.0 for linux-armv7l from official tarball
            NODE_VER=20.10.0
            ARCH=linux-armv7l
            curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-${ARCH}.tar.xz" -o /tmp/node.tar.xz
            mkdir -p /usr/local/lib/nodejs
            tar -xJf /tmp/node.tar.xz -C /usr/local/lib/nodejs
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/node" /usr/local/bin/node
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/npm" /usr/local/bin/npm
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/npx" /usr/local/bin/npx
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/corepack" /usr/local/bin/corepack || true
            node -v
            # Setup corepack/pnpm pinned by packageManager
            (corepack --version || npm i -g corepack) >/dev/null 2>&1 || true
            corepack enable
            PM_SPEC=$(node -e "try{const p=require('./package.json');console.log(p.packageManager||'')}catch(e){console.log('')}")
            if [ -n "$PM_SPEC" ]; then corepack prepare "$PM_SPEC" --activate; else corepack prepare pnpm@9.15.2 --activate; fi
          run: |
            set -euxo pipefail
            node -v
            pnpm -v
            # Prefetch only bililive-cli and its deps (avoid fetching whole monorepo)
            pnpm -F "bililive-cli"... fetch
            pnpm -F "bililive-cli"... install --frozen-lockfile --prefer-offline
            pnpm -F "bililive-cli"... build
            pnpm -F "bililive-cli" movePackage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/CLI/lib
          retention-days: 30

  prepare-release:
    if: ${{ inputs.is_release }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.validate_release_prepare.outputs.release_tag }}
      release_name: ${{ steps.validate_release_prepare.outputs.release_name }}
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - name: Validate release inputs (fail-fast)
        id: validate_release_prepare
        run: node ./scripts/github-ci-artifacts.js validate-release --tag "${{ inputs.release_tag }}" --name "${{ inputs.release_name }}"

      - name: Check existing release/tag
        id: check_existing_prepare
        run: node ./scripts/github-ci-artifacts.js check-release --tag "${{ steps.validate_release_prepare.outputs.release_tag || inputs.release_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Guard duplicate tag without force_replace
        if: ${{ !inputs.force_replace && steps.check_existing_prepare.outputs.release_exists == 'true' }}
        run: node -e "throw new Error('Release with this tag already exists. Set force_replace=true to replace it.')"

      - name: Force move tag to current commit
        if: ${{ inputs.force_replace }}
        run: node ./scripts/github-ci-artifacts.js move-tag --tag "${{ steps.validate_release_prepare.outputs.release_tag || inputs.release_tag }}" --sha "${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Purge all assets of existing release
        if: ${{ inputs.force_replace }}
        run: node ./scripts/github-ci-artifacts.js purge-release-assets --tag "${{ steps.validate_release_prepare.outputs.release_tag || inputs.release_tag }}"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

  release:
    needs: [prepare-release]
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 30
    env: {}

    strategy:
      matrix:
        include: *cli_matrix

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Setup Node + pnpm (composite)
        uses: ./.github/actions/cli-setup
      
      # 发布模式下优先复用同一提交的构建产物
      - name: Download prebuilt artifact for this commit
        id: download_artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: for-bgo.yml
          name: bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}
          commit: ${{ github.sha }}
          path: packages/CLI/lib
          if_no_artifact_found: warn

      - name: Check prebuilt presence
        id: prebuilt
        run: node ./scripts/github-ci-artifacts.js check-prebuilt --path packages/CLI/lib

      - name: Normalize prebuilt path (if nested)
        if: ${{ steps.prebuilt.outputs.found == 'true' }}
        run: node ./scripts/github-ci-artifacts.js normalize-prebuilt --path packages/CLI/lib

      - name: Build CLI (composite)
        if: ${{ steps.prebuilt.outputs.found != 'true' && matrix.arch != 'armv7' }}
        uses: ./.github/actions/cli-build

      - name: Build CLI in Ubuntu armv7 (emulated)
        if: ${{ steps.prebuilt.outputs.found != 'true' && matrix.arch == 'armv7' }}
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: armv7
          distro: ubuntu22.04
          image: arm32v7/ubuntu:22.04
          githubToken: ${{ github.token }}
          shell: /bin/bash
          install: |
            set -euxo pipefail
            apt-get update -y
            DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
              ca-certificates curl git tar xz-utils build-essential python3 pkg-config \
              libfontconfig1-dev libfreetype6-dev libcairo2-dev libpango1.0-dev libharfbuzz-dev \
              libjpeg-dev libpng-dev librsvg2-dev
            NODE_VER=20.10.0
            ARCH=linux-armv7l
            curl -fsSL "https://nodejs.org/dist/v${NODE_VER}/node-v${NODE_VER}-${ARCH}.tar.xz" -o /tmp/node.tar.xz
            mkdir -p /usr/local/lib/nodejs
            tar -xJf /tmp/node.tar.xz -C /usr/local/lib/nodejs
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/node" /usr/local/bin/node
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/npm" /usr/local/bin/npm
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/npx" /usr/local/bin/npx
            ln -sf "/usr/local/lib/nodejs/node-v${NODE_VER}-${ARCH}/bin/corepack" /usr/local/bin/corepack || true
            node -v
            (corepack --version || npm i -g corepack) >/dev/null 2>&1 || true
            corepack enable
            PM_SPEC=$(node -e "try{const p=require('./package.json');console.log(p.packageManager||'')}catch(e){console.log('')}")
            if [ -n "$PM_SPEC" ]; then corepack prepare "$PM_SPEC" --activate; else corepack prepare pnpm@9.15.2 --activate; fi
          run: |
            set -euxo pipefail
            node -v
            pnpm -v
            # Prefetch only bililive-cli and its deps (avoid fetching whole monorepo)
            pnpm -F "bililive-cli"... fetch
            pnpm -F "bililive-cli"... install --frozen-lockfile --prefer-offline
            pnpm -F "bililive-cli"... build
            pnpm -F "bililive-cli" movePackage

      - name: Pack release zip (Node)
        run: pnpm -F bililive-cli zip:lib -- --os "${{ matrix.os }}" --arch "${{ matrix.arch }}"

      - name: Upload prebuilt artifact for reuse (even in release)
        uses: actions/upload-artifact@v4
        with:
          name: bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}
          path: packages/CLI/lib
          retention-days: 7

      - name: release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}
          artifactErrorsFailBuild: false
          artifacts: "bililive-cli-lib-${{ matrix.os }}-${{ matrix.arch }}.zip"
          replacesArtifacts: false
          tag: ${{ needs.prepare-release.outputs.release_tag }}
          name: ${{ needs.prepare-release.outputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
